# Render Blueprint — deploys the backend API + a managed PostgreSQL database.
# In the Render dashboard: New + → Blueprint → point at this repo.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: ims-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ims-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false # set to your Vercel/Netlify URL after the frontend deploys
      - key: LOW_STOCK_THRESHOLD
        value: "10"
      - key: SEED_ON_STARTUP
        value: "true"

databases:
  - name: ims-db
    plan: free
    databaseName: ims
    user: ims
